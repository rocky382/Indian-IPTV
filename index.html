<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎬 Indian TV Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-main: #0a0e17;
            --bg-panel: #111827;
            --bg-list: #1a1f2e;
            --text-main: #ecf0f1;
            --text-muted: #95a5a6;
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
            --accent-red: #e74c3c;
            --accent-yellow: #f1c40f;
            --header-bg: #1f2a38;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            height: 100vh; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        header { 
            background: var(--bg-panel); 
            padding: 12px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--accent-blue); 
            flex-shrink: 0; 
        }
        header h1 { font-size: 1.1rem; }
        header small { color: var(--text-muted); font-style: italic; font-size: 0.8rem; }

        /* Main Content Wrapper (Handles Orientation) */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }

        /* Video Player */
        .player-section { flex: none; height: 35vh; min-height: 220px; background: #000; display: flex; flex-direction: column; width: 100%; }
        .video-container { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .player-controls { background: var(--bg-panel); padding: 8px 15px; display: flex; gap: 8px; align-items: center; flex-shrink: 0; border-bottom: 1px solid #333; }
        .btn { padding: 8px 12px; border: none; border-radius: 4px; font-weight: bold; font-size: 0.85rem; cursor: pointer; color: white; transition: 0.2s; white-space: nowrap; }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-stop { background: var(--accent-red); flex-shrink: 0; }
        .btn-refresh { background: var(--accent-blue); flex-shrink: 0; }
        
        .now-playing { margin-left: auto; color: var(--accent-green); font-weight: bold; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 45%; text-align: right; }

        /* List Section */
        .list-section { width: 100%; flex: 1; display: flex; flex-direction: column; background: var(--bg-main); overflow: hidden; }
        
        /* Single-line Toolbar Layout */
        .toolbar { 
            padding: 10px 15px; 
            background: var(--bg-panel); 
            display: flex; 
            gap: 8px; 
            align-items: center; 
            flex-shrink: 0; 
        }
        .toolbar input { 
            flex: 1; 
            padding: 10px; 
            background: var(--bg-list); 
            border: 1px solid #333; 
            color: white; 
            border-radius: 4px; 
            font-size: 0.95rem; 
            min-width: 0; /* Allows input to shrink gracefully on narrow viewports */
        }
        .toolbar input:focus { outline: 1px solid var(--accent-green); }

        /* Tabs aligned on the single-row toolbar */
        .btn-tab {
            background: var(--bg-list);
            color: var(--text-muted);
            border: 1px solid #333;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 10px 12px;
            transition: 0.2s;
            text-align: center;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-tab.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .channel-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 10px; position: relative; }
        
        /* Category Group Headers */
        .category-header {
            background: var(--header-bg);
            color: var(--accent-blue);
            padding: 8px 15px;
            font-weight: bold;
            font-size: 0.95rem;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #0a0e17;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .channel-item { 
            padding: 12px 15px; 
            border-bottom: 1px solid #222; 
            cursor: pointer; 
            transition: background 0.2s; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .channel-item:active { background: #2c3e50; }
        .channel-item.active { background: #1b4f30; border-left: 4px solid var(--accent-green); }
        
        .channel-info { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .channel-title { font-size: 1rem; font-weight: bold; display: flex; align-items: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .channel-meta { font-size: 0.8rem; color: var(--text-muted); }
        .status-badge { font-size: 0.7rem; background: var(--accent-green); color: black; padding: 2px 5px; border-radius: 4px; margin-left: 8px; font-weight: bold; display: inline-block; }

        /* Favorite Star Button */
        .btn-fav {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-fav.fav-active { color: var(--accent-yellow); }

        .status-bar { background: var(--bg-list); padding: 8px 15px; font-size: 0.8rem; color: var(--accent-green); display: flex; justify-content: space-between; flex-shrink: 0; border-top: 1px solid #333; }
        .validating-text { color: var(--accent-yellow) !important; font-weight: bold; }

        /* =========================================
           LANDSCAPE / DESKTOP LAYOUT 
           ========================================= */
        @media (orientation: landscape) {
            .main-content {
                flex-direction: row;
            }
            .player-section {
                flex: 1.5; /* Takes 60% of width */
                height: 100%;
                border-right: 1px solid #333;
            }
            .list-section {
                flex: 1; /* Takes 40% of width */
                height: 100%;
            }
            .player-controls {
                border-bottom: none;
            }
        }

        /* Auto-hide Header on strict mobile landscape (height < 500px) to maximize video space */
        @media (orientation: landscape) and (max-height: 500px) {
            header { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🎬 Indian TV Ultimate</h1>
        <small>by ROCKY</small>
    </header>

    <div class="main-content">
        <!-- VIDEO PLAYER -->
        <div class="player-section">
            <div class="video-container">
                <video id="videoPlayer" controls playsinline></video>
            </div>
            <div class="player-controls">
                <button class="btn btn-stop" onclick="stopPlayer()">⏹ STOP</button>
                <button class="btn btn-refresh" id="refreshBtn" onclick="startProcess()">🔄 Load</button>
                <div class="now-playing" id="nowPlayingText">Not playing</div>
            </div>
        </div>

        <!-- CHANNEL LIST & CONTROLS -->
        <div class="list-section">
            <div class="toolbar">
                <input type="text" id="searchInput" placeholder="🔍 Search channels..." oninput="filterChannels()">
                <button class="btn-tab active" id="tabAll" onclick="switchTab('all')">📺 All</button>
                <button class="btn-tab" id="tabFav" onclick="switchTab('favorites')">⭐ Favorites</button>
            </div>
            
            <div class="channel-list" id="channelList">
                <!-- Channels dynamically inject here -->
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span id="statusText">Ready</span>
        <span id="countText">0 Working</span>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const channelListEl = document.getElementById('channelList');
        const searchInput = document.getElementById('searchInput');
        const statusText = document.getElementById('statusText');
        const countText = document.getElementById('countText');
        const nowPlayingText = document.getElementById('nowPlayingText');
        const refreshBtn = document.getElementById('refreshBtn');
        
        let allChannels = [];
        let hls = null;
        let currentPlayingUrl = null;
        let currentValidationRun = 0; 
        let activeTab = 'all'; // 'all' or 'favorites'

        // Predefined custom channel list
        const customChannels = [
            {
                name: "DD Sahyadri",
                url: "https://d3qs3d2rkhfqrt.cloudfront.net/out/v1/66dcc3ebe182447ba42837e746cf0c7c/index.m3u8",
                group: "DD Network",
                language: "Marathi"
            },
            {
                name: "DD National",
                url: "https://cdn-1.pishow.tv/live/11/master.m3u8",
                group: "DD Network",
                language: "Hindi"
            },
            {
                name: "DD Sports 2.0",
                url: "https://d3qs3d2rkhfqrt.cloudfront.net/out/v1/b17adfe543354fdd8d189b110617cddd/index.m3u8",
                group: "Sports",
                language: "Hindi"
            },
            {
                name: "Goldmines",
                url: "https://cdn-2.pishow.tv/live/1459/master.m3u8",
                group: "Movies",
                language: "Hindi"
            },
            {
                name: "Big Magic",
                url: "https://mumt05.tangotv.in/87NeALx2BIGMAGIC/index.m3u8",
                group: "Movies",
                language: "Hindi"
            },
            {
                name: "Shemaroo Josh",
                url: "https://airtelapp.shemaroo.com/shemarooChumbakTV/smil:shemarooChumbakTVadp.smil/playlist.m3u8",
                group: "Entertainment",
                language: "Hindi"
            },
            {
                name: "StarPlus",
                url: "https://stream.tvivu.com/?url=http%3A%2F%2Ftvsen7.aynascope.net%2Fsphdbd%2Ftracks-v1a1%2Fmono.ts.m3u8&exp=1784523600&sig=79561eba934099b11e75888cfe1ac6973a5c434ef3663f4a995f4db24389b0e0",
                group: "Entertainment",
                language: "Hindi"
            },
            {
                name: "HISTORY TV18 - Hindi",
                url: "https://amg01448-amg01448c16-samsung-in-3495.playouts.now.amagi.tv/ts-ap-s1-n1/playlist/amg01448-samsungindia-historychannelhindi-samsungin/playlist.m3u8?ads.app_domain=%7BAPP_DOMAIN%7D&ads.app_name=%7BAPP_NAME%7D&ads.coppa=0&ads.did=%7BPSID%7D&ads.dnt=%7BTARGETOPT%7D",
                group: "Documentary",
                language: "Hindi"
            },
            {
                name: "The Movie Club",
                url: "https://amg01448-samsungin-movieclub-amagi-ssai-samsungin-bxp18.amagi.tv/ts-ap-s1-n1/playlist/amg01448-samsungin-movieclub-amagi-ssai-samsungin-adr/playlist.m3u8?ads.app_domain=%7BAPP_DOMAIN%7D&ads.app_domain=%7BAPP_DOMAIN%7D&ads.app_name=%7BAPP_NAME%7D&ads.app_name=%7BAPP_NAME%7D&ads.coppa=0&ads.device_did=%7BPSID%7D&ads.device_dnt=%7BTARGETOPT%7D&ads.did=%7BPSID%7D&ads.dnt=%7BTARGETOPT%7D&ads.service_id=IN38000072R&ads.ssai_vendor=SSSLIVE&channel_name=movieclub&pb_type=pb-zwaz3vs1k4cu7_akamai",
                group: "Movies",
                language: "Hindi"
            },
            {
                name: "beIN SPORTS 1",
                url: "https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8",
                group: "Sports",
                language: "International"
            }
        ];

        const indianKeywords = [
            'india', 'indian', 'hindi', 'tamil', 'telugu', 'kannada', 'malayalam',
            'marathi', 'bengali', 'punjabi', 'gujarati', 'bollywood', 'times now',
            'ndtv', 'aaj tak', 'republic', 'zee', 'star plus', 'colors', 'sony',
            'sun tv', 'vijay', 'gemini', 'udaya', 'asianet', 'news18', 'abp', 'sports18'
        ];

        // Trigger loading process when application initializes
        window.addEventListener('DOMContentLoaded', () => {
            startProcess();
        });

        // Favorites Storage Handlers
        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem('tv_favorites')) || [];
            } catch (e) {
                return [];
            }
        }

        function saveFavorites(favorites) {
            localStorage.setItem('tv_favorites', JSON.stringify(favorites));
        }

        function toggleFavorite(ch) {
            let favorites = getFavorites();
            const index = favorites.findIndex(fav => fav.url === ch.url);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(ch);
            }
            saveFavorites(favorites);
            filterChannels();
        }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('tabAll').classList.toggle('active', tab === 'all');
            document.getElementById('tabFav').classList.toggle('active', tab === 'favorites');
            filterChannels();
        }

        async function startProcess() {
            currentValidationRun++;
            refreshBtn.disabled = true;
            searchInput.value = "";
            channelListEl.innerHTML = "";
            
            // Prime system with user-specified custom channels immediately
            allChannels = [...customChannels];
            sortAllChannels();
            filterChannels();
            
            statusText.className = "";
            statusText.innerText = "Downloading playlist...";
            countText.innerText = `${allChannels.length} Working`;

            try {
                const response = await fetch("https://iptv-org.github.io/iptv/index.m3u");
                if (!response.ok) throw new Error("Network response was not ok");
                
                statusText.innerText = "Parsing playlist...";
                const text = await response.text();
                const rawChannels = parseM3U(text);
                
                statusText.classList.add('validating-text');
                await validateChannels(rawChannels, currentValidationRun);
                
            } catch (error) {
                statusText.innerText = "Playlist fetch failed. Local channels ready.";
                statusText.style.color = "var(--accent-yellow)";
                refreshBtn.disabled = false;
                refreshBtn.innerText = "🔄 Load";
            }
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            let currentChannel = {};
            let extractedChannels = [];

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.split(',').pop();
                    currentChannel.name = nameMatch ? nameMatch.trim() : "Unknown";
                    
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentChannel.group = groupMatch && groupMatch[1].trim() !== "" ? groupMatch[1] : "General";
                    
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    
                    const textToCheck = (currentChannel.name + " " + currentChannel.group).toLowerCase();
                    const isIndian = indianKeywords.some(keyword => textToCheck.includes(keyword));
                    
                    if (isIndian) {
                        currentChannel.language = guessLanguage(currentChannel.name, currentChannel.group);
                        extractedChannels.push({...currentChannel});
                    }
                    currentChannel = {}; 
                }
            }
            return extractedChannels;
        }

        function guessLanguage(name, group) {
            const text = (name + " " + group).toLowerCase();
            if (['hindi', 'bollywood', 'zee', 'star plus', 'colors'].some(w => text.includes(w))) return "Hindi";
            if (['tamil', 'sun tv', 'vijay'].some(w => text.includes(w))) return "Tamil";
            if (['telugu', 'gemini'].some(w => text.includes(w))) return "Telugu";
            if (['kannada', 'udaya'].some(w => text.includes(w))) return "Kannada";
            if (['malayalam', 'asianet'].some(w => text.includes(w))) return "Malayalam";
            return "Other Language";
        }

        // --- Fast Ping Stream Check ---
        async function checkStream(url) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3500); 
                
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    controller.abort(); 
                    return true;
                }
                return false;
            } catch (error) {
                return false; 
            }
        }

        // --- Live Incremental Validation ---
        async function validateChannels(channels, runId) {
            const batchSize = 12; 
            let testedCount = 0;
            
            for (let i = 0; i < channels.length; i += batchSize) {
                if (runId !== currentValidationRun) return; 

                const batch = channels.slice(i, i + batchSize);
                
                const promises = batch.map(async (ch) => {
                    const isWorking = await checkStream(ch.url);
                    testedCount++;
                    
                    if (isWorking && runId === currentValidationRun) {
                        insertAndRenderChannel(ch);
                    }
                });
                
                await Promise.all(promises);
                
                statusText.innerText = `Testing: ${testedCount} / ${channels.length}...`;
                refreshBtn.innerText = `${Math.round((testedCount / channels.length) * 100)}%`;
            }
            
            if (runId === currentValidationRun) {
                statusText.classList.remove('validating-text');
                statusText.innerText = "Scan Complete.";
                refreshBtn.disabled = false;
                refreshBtn.innerText = "🔄 Reload";
            }
        }

        // --- Sort by Category, then by Name ---
        function sortAllChannels() {
            allChannels.sort((a, b) => {
                const groupCompare = a.group.localeCompare(b.group);
                if (groupCompare !== 0) return groupCompare;
                return a.name.localeCompare(b.name);
            });
        }

        function insertAndRenderChannel(ch) {
            // Prevent duplicates in case the online list also contains the custom URLs
            if (allChannels.some(existing => existing.url === ch.url)) return;

            allChannels.push(ch);
            sortAllChannels();
            filterChannels();
        }

        function filterChannels() {
            const query = searchInput.value.toLowerCase();
            const sourceList = (activeTab === 'favorites') ? getFavorites() : allChannels;

            const filtered = sourceList.filter(ch => 
                ch.name.toLowerCase().includes(query) || 
                ch.group.toLowerCase().includes(query) ||
                ch.language.toLowerCase().includes(query)
            );
            
            renderDOM(filtered);
        }

        function renderDOM(channels) {
            channelListEl.innerHTML = "";
            
            if (channels.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.style.padding = '30px 15px';
                emptyMsg.style.textAlign = 'center';
                emptyMsg.style.color = 'var(--text-muted)';
                emptyMsg.style.fontSize = '0.9rem';
                emptyMsg.innerText = activeTab === 'favorites' 
                    ? "Your favorites list is currently empty. Click the ☆ icon on any channel to save it here." 
                    : "No matching channels found.";
                channelListEl.appendChild(emptyMsg);
                countText.innerText = "0 Working";
                return;
            }

            const fragment = document.createDocumentFragment();
            let currentGroup = "";
            const favorites = getFavorites();

            channels.forEach((ch) => {
                if (ch.group !== currentGroup) {
                    const header = document.createElement('div');
                    header.className = 'category-header';
                    header.innerText = ch.group;
                    fragment.appendChild(header);
                    currentGroup = ch.group;
                }

                const div = document.createElement('div');
                div.className = 'channel-item';
                if (ch.url === currentPlayingUrl) div.classList.add('active'); 

                const isFav = favorites.some(fav => fav.url === ch.url);

                // Informational block
                const infoDiv = document.createElement('div');
                infoDiv.className = 'channel-info';
                infoDiv.innerHTML = `
                    <div class="channel-title">
                        ${ch.name} <span class="status-badge">Live</span>
                    </div>
                    <div class="channel-meta">${ch.language}</div>
                `;
                infoDiv.onclick = () => playStream(ch.url, ch.name);

                // Interactive Favorite star button
                const favBtn = document.createElement('button');
                favBtn.className = `btn-fav ${isFav ? 'fav-active' : ''}`;
                favBtn.innerText = isFav ? '★' : '☆';
                favBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleFavorite(ch);
                };

                div.appendChild(infoDiv);
                div.appendChild(favBtn);
                fragment.appendChild(div);
            });

            channelListEl.appendChild(fragment);
            countText.innerText = `${channels.length} Working`;
        }

        function playStream(url, name) {
            currentPlayingUrl = url;
            filterChannels(); 

            nowPlayingText.innerText = `Connecting...`;

            if (hls) {
                hls.destroy();
            }

            if (Hls.isSupported() && url.includes('.m3u8')) {
                hls = new Hls({ debug: false, enableWorker: true });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    video.play().catch(e => console.log("Autoplay blocked"));
                    nowPlayingText.innerText = `▶ ${name}`;
                });
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) nowPlayingText.innerText = `❌ Stream Offline/Blocked`;
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function () {
                    video.play().catch(e => console.log("Autoplay blocked"));
                    nowPlayingText.innerText = `▶ ${name}`;
                });
            } 
            else {
                video.src = url;
                video.play().catch(e => console.log("Autoplay blocked"));
                nowPlayingText.innerText = `▶ ${name}`;
            }
            
            // Only scroll to top if we are in portrait mode
            if (window.innerHeight > window.innerWidth) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function stopPlayer() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.pause();
            video.removeAttribute('src');
            video.load();
            currentPlayingUrl = null;
            nowPlayingText.innerText = "Not playing";
            filterChannels(); 
        }
    </script>
</body>
</html>
