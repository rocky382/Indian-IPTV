<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎬 Indian TV Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-main: #0a0e17;
            --bg-panel: #111827;
            --bg-list: #1a1f2e;
            --text-main: #ecf0f1;
            --text-muted: #95a5a6;
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
            --accent-red: #e74c3c;
            --accent-yellow: #f1c40f;
            --header-bg: #1f2a38;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            height: 100vh; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        header { background: var(--bg-panel); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent-blue); flex-shrink: 0; }
        header h1 { font-size: 1.1rem; }
        header small { color: var(--text-muted); font-style: italic; font-size: 0.8rem; }

        /* Main Content Wrapper (Handles Orientation) */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }

        /* Video Player */
        .player-section { flex: none; height: 35vh; min-height: 220px; background: #000; display: flex; flex-direction: column; width: 100%; }
        .video-container { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .player-controls { background: var(--bg-panel); padding: 8px 15px; display: flex; gap: 10px; align-items: center; flex-shrink: 0; border-bottom: 1px solid #333; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; font-size: 0.9rem; cursor: pointer; color: white; transition: 0.2s; white-space: nowrap; }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-stop { background: var(--accent-red); }
        .btn-refresh { background: var(--accent-blue); flex: 1; text-align: center; }
        
        .now-playing { margin-left: auto; color: var(--accent-green); font-weight: bold; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%; text-align: right; }

        /* List Section */
        .list-section { width: 100%; flex: 1; display: flex; flex-direction: column; background: var(--bg-main); overflow: hidden; }
        
        .toolbar { padding: 10px 15px; background: var(--bg-panel); display: flex; gap: 10px; flex-shrink: 0; }
        .toolbar input { flex: 2; padding: 10px; background: var(--bg-list); border: 1px solid #333; color: white; border-radius: 4px; font-size: 0.95rem; }
        .toolbar input:focus { outline: 1px solid var(--accent-green); }

        .channel-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 10px; position: relative; }
        
        /* Category Group Headers */
        .category-header {
            background: var(--header-bg);
            color: var(--accent-blue);
            padding: 8px 15px;
            font-weight: bold;
            font-size: 0.95rem;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #0a0e17;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .channel-item { padding: 12px 15px; border-bottom: 1px solid #222; cursor: pointer; transition: background 0.2s; display: flex; flex-direction: column; gap: 4px; }
        .channel-item:active { background: #2c3e50; }
        .channel-item.active { background: #1b4f30; border-left: 4px solid var(--accent-green); }
        
        .channel-title { font-size: 1rem; font-weight: bold; display: flex; align-items: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .channel-meta { font-size: 0.8rem; color: var(--text-muted); }
        .status-badge { font-size: 0.7rem; background: var(--accent-green); color: black; padding: 2px 5px; border-radius: 4px; margin-left: 8px; font-weight: bold; display: inline-block; }

        .status-bar { background: var(--bg-list); padding: 8px 15px; font-size: 0.8rem; color: var(--accent-green); display: flex; justify-content: space-between; flex-shrink: 0; border-top: 1px solid #333; }
        .validating-text { color: var(--accent-yellow) !important; font-weight: bold; }

        /* =========================================
           LANDSCAPE / DESKTOP LAYOUT 
           ========================================= */
        @media (orientation: landscape) {
            .main-content {
                flex-direction: row;
            }
            .player-section {
                flex: 1.5; /* Takes 60% of width */
                height: 100%;
                border-right: 1px solid #333;
            }
            .list-section {
                flex: 1; /* Takes 40% of width */
                height: 100%;
            }
            .player-controls {
                border-bottom: none;
            }
        }

        /* Auto-hide Header on strict mobile landscape (height < 500px) to maximize video space */
        @media (orientation: landscape) and (max-height: 500px) {
            header { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🎬 Indian TV Ultimate</h1>
        <small>by ROCKY</small>
    </header>

    <div class="main-content">
        <!-- VIDEO PLAYER -->
        <div class="player-section">
            <div class="video-container">
                <video id="videoPlayer" controls playsinline></video>
            </div>
            <div class="player-controls">
                <button class="btn btn-stop" onclick="stopPlayer()">⏹ STOP</button>
                <div class="now-playing" id="nowPlayingText">Not playing</div>
            </div>
        </div>

        <!-- CHANNEL LIST -->
        <div class="list-section">
            <div class="toolbar">
                <input type="text" id="searchInput" placeholder="🔍 Search channels..." oninput="filterChannels()">
                <button class="btn btn-refresh" id="refreshBtn" onclick="startProcess()">🔄 Load</button>
            </div>
            
            <div class="channel-list" id="channelList">
                <!-- Channels dynamically inject here -->
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span id="statusText">Ready - Click 'Load'</span>
        <span id="countText">0 Working</span>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const channelListEl = document.getElementById('channelList');
        const searchInput = document.getElementById('searchInput');
        const statusText = document.getElementById('statusText');
        const countText = document.getElementById('countText');
        const nowPlayingText = document.getElementById('nowPlayingText');
        const refreshBtn = document.getElementById('refreshBtn');
        
        let allChannels = [];
        let hls = null;
        let currentPlayingUrl = null;
        let currentValidationRun = 0; 

        const indianKeywords = [
            'india', 'indian', 'hindi', 'tamil', 'telugu', 'kannada', 'malayalam',
            'marathi', 'bengali', 'punjabi', 'gujarati', 'bollywood', 'times now',
            'ndtv', 'aaj tak', 'republic', 'zee', 'star plus', 'colors', 'sony',
            'sun tv', 'vijay', 'gemini', 'udaya', 'asianet', 'news18', 'abp', 'sports18'
        ];

        async function startProcess() {
            currentValidationRun++;
            refreshBtn.disabled = true;
            searchInput.value = "";
            channelListEl.innerHTML = "";
            allChannels = [];
            
            statusText.className = "";
            statusText.innerText = "Downloading playlist...";
            countText.innerText = "0 Working";

            try {
                const response = await fetch("https://iptv-org.github.io/iptv/index.m3u");
                if (!response.ok) throw new Error("Network response was not ok");
                
                statusText.innerText = "Parsing playlist...";
                const text = await response.text();
                const rawChannels = parseM3U(text);
                
                statusText.classList.add('validating-text');
                await validateChannels(rawChannels, currentValidationRun);
                
            } catch (error) {
                statusText.innerText = "Error loading! Check internet.";
                statusText.style.color = "var(--accent-red)";
                refreshBtn.disabled = false;
                refreshBtn.innerText = "🔄 Load";
            }
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            let currentChannel = {};
            let extractedChannels = [];

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.split(',').pop();
                    currentChannel.name = nameMatch ? nameMatch.trim() : "Unknown";
                    
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    // Standardize empty groups to "General"
                    currentChannel.group = groupMatch && groupMatch[1].trim() !== "" ? groupMatch[1] : "General";
                    
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    
                    const textToCheck = (currentChannel.name + " " + currentChannel.group).toLowerCase();
                    const isIndian = indianKeywords.some(keyword => textToCheck.includes(keyword));
                    
                    if (isIndian) {
                        currentChannel.language = guessLanguage(currentChannel.name, currentChannel.group);
                        extractedChannels.push({...currentChannel});
                    }
                    currentChannel = {}; 
                }
            }
            return extractedChannels;
        }

        function guessLanguage(name, group) {
            const text = (name + " " + group).toLowerCase();
            if (['hindi', 'bollywood', 'zee', 'star plus', 'colors'].some(w => text.includes(w))) return "Hindi";
            if (['tamil', 'sun tv', 'vijay'].some(w => text.includes(w))) return "Tamil";
            if (['telugu', 'gemini'].some(w => text.includes(w))) return "Telugu";
            if (['kannada', 'udaya'].some(w => text.includes(w))) return "Kannada";
            if (['malayalam', 'asianet'].some(w => text.includes(w))) return "Malayalam";
            return "Other Language";
        }

        // --- Fast Ping Stream Check ---
        async function checkStream(url) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3500); 
                
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    controller.abort(); 
                    return true;
                }
                return false;
            } catch (error) {
                return false; 
            }
        }

        // --- Live Incremental Validation ---
        async function validateChannels(channels, runId) {
            const batchSize = 12; 
            let testedCount = 0;
            
            for (let i = 0; i < channels.length; i += batchSize) {
                if (runId !== currentValidationRun) return; 

                const batch = channels.slice(i, i + batchSize);
                
                const promises = batch.map(async (ch) => {
                    const isWorking = await checkStream(ch.url);
                    testedCount++;
                    
                    if (isWorking && runId === currentValidationRun) {
                        insertAndRenderChannel(ch);
                    }
                });
                
                await Promise.all(promises);
                
                statusText.innerText = `Testing: ${testedCount} / ${channels.length}...`;
                refreshBtn.innerText = `${Math.round((testedCount / channels.length) * 100)}%`;
            }
            
            if (runId === currentValidationRun) {
                statusText.classList.remove('validating-text');
                statusText.innerText = "Scan Complete.";
                refreshBtn.disabled = false;
                refreshBtn.innerText = "🔄 Reload";
            }
        }

        // --- Sort by Category, then by Name ---
        function insertAndRenderChannel(ch) {
            allChannels.push(ch);
            
            allChannels.sort((a, b) => {
                const groupCompare = a.group.localeCompare(b.group);
                if (groupCompare !== 0) return groupCompare;
                return a.name.localeCompare(b.name);
            });
            
            filterChannels();
        }

        function filterChannels() {
            const query = searchInput.value.toLowerCase();
            const filtered = allChannels.filter(ch => 
                ch.name.toLowerCase().includes(query) || 
                ch.group.toLowerCase().includes(query) ||
                ch.language.toLowerCase().includes(query)
            );
            
            renderDOM(filtered);
        }

        function renderDOM(channels) {
            channelListEl.innerHTML = "";
            const fragment = document.createDocumentFragment();
            let currentGroup = "";

            channels.forEach((ch) => {
                if (ch.group !== currentGroup) {
                    const header = document.createElement('div');
                    header.className = 'category-header';
                    header.innerText = ch.group;
                    fragment.appendChild(header);
                    currentGroup = ch.group;
                }

                const div = document.createElement('div');
                div.className = 'channel-item';
                if (ch.url === currentPlayingUrl) div.classList.add('active'); 

                div.innerHTML = `
                    <div class="channel-title">
                        ${ch.name} <span class="status-badge">Live</span>
                    </div>
                    <div class="channel-meta">${ch.language}</div>
                `;
                div.onclick = () => playStream(ch.url, ch.name);
                fragment.appendChild(div);
            });

            channelListEl.appendChild(fragment);
            countText.innerText = `${allChannels.length} Working`;
        }

        function playStream(url, name) {
            currentPlayingUrl = url;
            filterChannels(); 

            nowPlayingText.innerText = `Connecting...`;

            if (hls) {
                hls.destroy();
            }

            if (Hls.isSupported() && url.includes('.m3u8')) {
                hls = new Hls({ debug: false, enableWorker: true });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    video.play().catch(e => console.log("Autoplay blocked"));
                    nowPlayingText.innerText = `▶ ${name}`;
                });
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) nowPlayingText.innerText = `❌ Stream Offline/Blocked`;
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function () {
                    video.play().catch(e => console.log("Autoplay blocked"));
                    nowPlayingText.innerText = `▶ ${name}`;
                });
            } 
            else {
                video.src = url;
                video.play().catch(e => console.log("Autoplay blocked"));
                nowPlayingText.innerText = `▶ ${name}`;
            }
            
            // Only scroll to top if we are in portrait mode
            if (window.innerHeight > window.innerWidth) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function stopPlayer() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.pause();
            video.removeAttribute('src');
            video.load();
            currentPlayingUrl = null;
            nowPlayingText.innerText = "Not playing";
            filterChannels(); 
        }
    </script>
</body>
</html>
